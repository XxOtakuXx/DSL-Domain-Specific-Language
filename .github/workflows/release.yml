name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip Windows build
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          $dst = "DSL-Prompt-Studio-Windows.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dst
          Write-Host "Created $dst"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: DSL-Prompt-Studio-Windows.zip

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Precache macOS artifacts
        run: flutter precache --macos

      - name: Install CocoaPods dependencies
        run: cd macos && pod install

      - name: Build macOS
        run: flutter build macos --release

      - name: Zip macOS app bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/DSL-Prompt-Studio-macOS.zip" *.app
          echo "Created DSL-Prompt-Studio-macOS.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: DSL-Prompt-Studio-macOS.zip

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Tar Linux bundle
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/DSL-Prompt-Studio-Linux.tar.gz" .
          echo "Created DSL-Prompt-Studio-Linux.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: DSL-Prompt-Studio-Linux.tar.gz

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          name: DSL Prompt Studio ${{ github.ref_name }}
          body: |
            <div align="center">

            # DSL Prompt Studio ${{ github.ref_name }}

            **Write structured DSL or plain English. Generate token-optimized AI prompts instantly.**

            Native desktop app — Windows · macOS · Linux · No Flutter required · No internet required

            </div>

            ---

            ## What's New

            ### ✨ New Features

            - **Template Library** — 83 professionally crafted DSL prompt templates across 12 categories (Software Dev, Mobile, API Design, Content & Writing, AI & Prompts, DevOps, Data & ML, Business, Education, Creative, Legal & HR, Research). Browse, search by keyword, filter by category, and load any template into the editor in one click.
            - **Templates tab** — new top-level navigation tab alongside Editor and Settings for instant access to the library.
            - **Plain Talk mode** — switch from DSL syntax to natural language. Describe what you want in plain English and the app converts it to structured output automatically.
            - **AI provider integration** — connect Gemini, OpenAI (GPT-4o-mini), Anthropic (Claude Haiku), or a local Ollama instance to power Plain Talk parsing. Falls back to a built-in offline rule-based parser when no provider is configured.
            - **Settings tab** — configure your AI provider, paste your API key, and save — persists between sessions.

            ### 🐛 Bug Fixes

            - Fixed keys with comma-separated values (e.g. `STACK React, Node.js`) being silently dropped from compact prompt output.
            - Fixed the editor losing keyboard focus after the first Generate — `Ctrl+Enter` now works reliably on every subsequent press.

            ### 📖 Documentation

            - Full key reference cheat sheet added to README — every supported key by category with examples.
            - Use-case examples added for Web App, Mobile, REST API, GraphQL, Blog Post, CI/CD Pipeline, Database Schema, AI System Prompt, Data Science, and Microservice.
            - Project structure, state management table, and platform notes fully updated.

            ---

            ## Download

            > These are **self-contained builds**. No Flutter, no runtime, no installer wizard required.

            | Platform | Download | How to run |
            |---|---|---|
            | 🪟 **Windows** | `DSL-Prompt-Studio-Windows.zip` | Extract the zip → double-click `dsl_domain_specific_language.exe` |
            | 🍎 **macOS** | `DSL-Prompt-Studio-macOS.zip` | Unzip → drag `.app` to Applications → double-click to open |
            | 🐧 **Linux** | `DSL-Prompt-Studio-Linux.tar.gz` | `tar -xzf DSL-Prompt-Studio-Linux.tar.gz` → `./dsl_domain_specific_language` |

            > **macOS — first launch:** Right-click the app and choose **Open** to bypass the Gatekeeper warning. The app is not notarized.

            ---

            ## System Requirements

            | Platform | Minimum |
            |---|---|
            | Windows | Windows 10 x64 or later |
            | macOS | macOS 10.14 Mojave or later (Apple Silicon native via Rosetta 2) |
            | Linux | Ubuntu 22.04+ · requires `libgtk-3` |

            ---

            ## Full Changelog

            | Version | Date | Highlights |
            |---|---|---|
            | **v1.2.0** | 2026-04-03 | Template Library (83 templates, 12 categories), Templates tab, Plain Talk mode, AI providers, Settings tab |
            | **v1.0.2** | 2026-03-29 | Fix: comma-separated values dropped from compact output |
            | **v1.0.1** | 2026-03-29 | Fix: editor focus lost after first Generate |
            | **v1.0.0** | 2026-03-29 | Initial release — Windows, macOS, Linux |

            ---

            <div align="center">

            [📖 Documentation](https://github.com/XxOtakuXx/DSL-Domain-Specific-Language#readme) · [🐛 Report a Bug](https://github.com/XxOtakuXx/DSL-Domain-Specific-Language/issues) · [💡 Request a Feature](https://github.com/XxOtakuXx/DSL-Domain-Specific-Language/issues)

            Built with Flutter · MIT License

            </div>
          draft: false
          prerelease: false
          make_latest: true
          files: |
            artifacts/DSL-Prompt-Studio-Windows.zip
            artifacts/DSL-Prompt-Studio-macOS.zip
            artifacts/DSL-Prompt-Studio-Linux.tar.gz
