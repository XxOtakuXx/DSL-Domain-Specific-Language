name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip Windows build
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          $dst = "DSL-Prompt-Studio-Windows.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dst
          Write-Host "Created $dst"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: DSL-Prompt-Studio-Windows.zip

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Precache macOS artifacts
        run: flutter precache --macos

      - name: Install CocoaPods dependencies
        run: cd macos && pod install

      - name: Build macOS
        run: flutter build macos --release

      - name: Zip macOS app bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/DSL-Prompt-Studio-macOS.zip" *.app
          echo "Created DSL-Prompt-Studio-macOS.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: DSL-Prompt-Studio-macOS.zip

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Tar Linux bundle
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/DSL-Prompt-Studio-Linux.tar.gz" .
          echo "Created DSL-Prompt-Studio-Linux.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: DSL-Prompt-Studio-Linux.tar.gz

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      # Extract the changelog section for this tag from CHANGELOG.md.
      # Looks for the line starting with "## [<tag>]" and copies everything
      # up to (but not including) the next "## [" heading.
      - name: Extract changelog for ${{ github.ref_name }}
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          # Find the line number of the section header for this tag
          START=$(grep -n "^## \[${TAG}\]" CHANGELOG.md | head -1 | cut -d: -f1)
          if [ -z "$START" ]; then
            echo "notes=No changelog entry found for ${TAG}." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Find the next section header after START
          NEXT=$(awk "NR > $START && /^## \[/" CHANGELOG.md | head -1)
          END=$(grep -n "^## \[" CHANGELOG.md | awk -F: -v s="$START" '$1 > s {print $1; exit}')
          if [ -z "$END" ]; then
            # This is the last section — take to end of file
            BODY=$(sed -n "$((START+1)),\$p" CHANGELOG.md | sed '/^---$/d' | sed '/^$/N;/^\n$/d')
          else
            BODY=$(sed -n "$((START+1)),$((END-1))p" CHANGELOG.md | sed '/^---$/d' | sed '/^$/N;/^\n$/d')
          fi
          # Write to a temp file to preserve newlines
          echo "$BODY" > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Build release body
        id: body
        run: |
          TAG="${{ github.ref_name }}"
          cat > /tmp/release_body.md << 'RELEASE_BODY_EOF'
          <div align="center">

          # DSL Prompt Studio TAG_PLACEHOLDER

          **Write structured DSL or plain English. Generate token-optimized AI prompts instantly.**

          Native desktop app — Windows · macOS · Linux · No Flutter required · No internet required

          </div>

          ---

          RELEASE_BODY_EOF

          # Replace tag placeholder
          sed -i "s/TAG_PLACEHOLDER/${TAG}/g" /tmp/release_body.md

          # Append the extracted changelog section
          cat /tmp/release_notes.md >> /tmp/release_body.md

          cat >> /tmp/release_body.md << 'FOOTER_EOF'

          ---

          ## Download

          > These are **self-contained builds**. No Flutter, no runtime, no installer wizard required.

          | Platform | Download | How to run |
          |---|---|---|
          | 🪟 **Windows** | `DSL-Prompt-Studio-Windows.zip` | Extract the zip → double-click `dsl_domain_specific_language.exe` |
          | 🍎 **macOS** | `DSL-Prompt-Studio-macOS.zip` | Unzip → drag `.app` to Applications → double-click to open |
          | 🐧 **Linux** | `DSL-Prompt-Studio-Linux.tar.gz` | `tar -xzf DSL-Prompt-Studio-Linux.tar.gz` → `./dsl_domain_specific_language` |

          > **macOS — first launch:** Right-click the app and choose **Open** to bypass the Gatekeeper warning. The app is not notarized.

          ---

          ## System Requirements

          | Platform | Minimum |
          |---|---|
          | Windows | Windows 10 x64 or later |
          | macOS | macOS 10.14 Mojave or later (Apple Silicon native via Rosetta 2) |
          | Linux | Ubuntu 22.04+ · requires `libgtk-3` |

          ---

          <div align="center">

          [📖 Documentation](https://github.com/XxOtakuXx/DSL-Domain-Specific-Language#readme) · [🐛 Report a Bug](https://github.com/XxOtakuXx/DSL-Domain-Specific-Language/issues) · [💡 Request a Feature](https://github.com/XxOtakuXx/DSL-Domain-Specific-Language/issues)

          Built with Flutter · MIT License

          </div>
          FOOTER_EOF

          echo "body_file=/tmp/release_body.md" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          name: DSL Prompt Studio ${{ github.ref_name }}
          body_path: /tmp/release_body.md
          draft: false
          prerelease: false
          make_latest: true
          files: |
            artifacts/DSL-Prompt-Studio-Windows.zip
            artifacts/DSL-Prompt-Studio-macOS.zip
            artifacts/DSL-Prompt-Studio-Linux.tar.gz
